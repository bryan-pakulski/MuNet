name: Wheels

on:
  push:
    branches: [main]
    tags: ["v*", "dev*"]
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.20.0
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-*
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: sameli/manylinux_2_28_x86_64_cuda_12.3
          CIBW_ENVIRONMENT_LINUX: >-
            CUDA_HOME=/usr/local/cuda
            CUDACXX=/usr/local/cuda/bin/nvcc
            CC=/opt/rh/gcc-toolset-12/root/usr/bin/gcc
            CXX=/opt/rh/gcc-toolset-12/root/usr/bin/g++
            CUDAHOSTCXX=/opt/rh/gcc-toolset-12/root/usr/bin/g++
            CMAKE_CUDA_HOST_COMPILER=/opt/rh/gcc-toolset-12/root/usr/bin/g++
            PATH=/opt/rh/gcc-toolset-12/root/usr/bin:/usr/local/cuda/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
            CMAKE_ARGS="-DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc -DCMAKE_CUDA_HOST_COMPILER=/opt/rh/gcc-toolset-12/root/usr/bin/g++ -DVulkan_INCLUDE_DIR=/usr/include -DVulkan_LIBRARY=/lib64/libvulkan.so"
          CIBW_BEFORE_ALL_LINUX: |
            set -euxo pipefail

            # Vulkan deps
            dnf -y install vulkan-devel vulkan-tools

            # Install a CUDA-supported host toolchain (gcc 12)
            dnf -y install gcc-toolset-12-gcc gcc-toolset-12-gcc-c++

            # Ensure canonical CUDA symlink exists
            if [ -d /usr/local/cuda-12.3 ] && [ ! -e /usr/local/cuda ]; then
              ln -s /usr/local/cuda-12.3 /usr/local/cuda
            fi

            # Optional shader tools
            dnf -y install glslang-tools || true
            dnf -y install shaderc-devel || true
            dnf -y install shaderc || true

            /opt/rh/gcc-toolset-12/root/usr/bin/g++ --version
            nvcc --version
            vulkaninfo --summary || true
            glslc --version || true
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish_testpypi:
    name: Publish dev wheels to TestPyPI
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/dev')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*

      - name: Flatten wheel artifacts
        run: |
          mkdir -p wheelhouse
          find dist -name "*.whl" -exec cp {} wheelhouse/ \;

      - name: Check wheel file sizes
        run: |
          set -euxo pipefail
          ls -lh wheelhouse/*.whl
          python - <<'PY'
          from pathlib import Path
          limit = 100 * 1024 * 1024
          too_large = []
          for wheel in Path("wheelhouse").glob("*.whl"):
            size = wheel.stat().st_size
            print(f"{wheel.name}: {size / (1024 * 1024):.1f} MB")
            if size > limit:
              too_large.append((wheel.name, size))
          if too_large:
            names = ", ".join(name for name, _ in too_large)
            raise SystemExit(
              "Wheel exceeds TestPyPI/PyPI default 100 MB file limit: "
              f"{names}. See https://docs.pypi.org/project-management/storage-limits/"
            )
          PY

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  publish:
    name: Publish release wheels to PyPI
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*

      - name: Flatten wheel artifacts
        run: |
          mkdir -p wheelhouse
          find dist -name "*.whl" -exec cp {} wheelhouse/ \;

      - name: Check wheel file sizes
        run: |
          set -euxo pipefail
          ls -lh wheelhouse/*.whl
          python - <<'PY'
          from pathlib import Path
          limit = 100 * 1024 * 1024
          too_large = []
          for wheel in Path("wheelhouse").glob("*.whl"):
            size = wheel.stat().st_size
            print(f"{wheel.name}: {size / (1024 * 1024):.1f} MB")
            if size > limit:
              too_large.append((wheel.name, size))
          if too_large:
            names = ", ".join(name for name, _ in too_large)
            raise SystemExit(
              "Wheel exceeds TestPyPI/PyPI default 100 MB file limit: "
              f"{names}. See https://docs.pypi.org/project-management/storage-limits/"
            )
          PY

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
          verbose: true
