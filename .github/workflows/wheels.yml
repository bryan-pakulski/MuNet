name: Wheels

on:
  push:
    branches: [main]
    tags: ["v*", "dev*"]
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.20.0
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-*
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ENVIRONMENT_LINUX: CUDA_HOME=/usr/local/cuda PATH=/usr/local/cuda/bin:$PATH LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH
          # Public prebuilt manylinux image with CUDA toolchain included.
          # Note: cibuildwheel linux builds must run in a manylinux-compatible image.
          CIBW_MANYLINUX_X86_64_IMAGE: sameli/manylinux_2_28_x86_64_cuda_12.3
          CIBW_BEFORE_ALL_LINUX: |
            dnf -y install vulkan-loader-devel vulkan-tools glslang shaderc
            vulkaninfo --summary || true
            glslc --version || true
            nvcc --version

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish_testpypi:
    name: Publish dev wheels to TestPyPI
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/dev')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten wheel artifacts
        run: |
          mkdir -p wheelhouse
          find dist -name "*.whl" -exec cp {} wheelhouse/ \;

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish:
    name: Publish release wheels to PyPI
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten wheel artifacts
        run: |
          mkdir -p wheelhouse
          find dist -name "*.whl" -exec cp {} wheelhouse/ \;

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
